<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }

        body {
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, #4facfe, #00f2fe, #43e97b, #38f9d7);
            animation: bg 10s infinite linear;
            z-index: -1;
        }

        @keyframes bg {
            0% { transform: translate(0,0); }
            50% { transform: translate(-25%, -25%); }
            100% { transform: translate(0,0); }
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 50px;
            background: rgba(0,0,0,0.4);
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li { margin-left: 25px; }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        nav ul li a:hover { color: yellow; }

        .form-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        form {
            background: rgba(0,0,0,0.6);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: yellow;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: orange;
        }
    </style>
</head>
<body>

<nav>
    <h1>My Portfolio</h1>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="contact.html">Contact Me</a></li>
        <li><a href="enquire.html">Enquire</a></li>
    </ul>
</nav>

<div class="form-container">
    <form>
        <h2>Enquiry Form</h2>

        <label>Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Reason to Contact</label>
        <textarea placeholder="Enter your reason" required></textarea>

        <label>Contact Number</label>
        <input type="tel" placeholder="Enter your number" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
